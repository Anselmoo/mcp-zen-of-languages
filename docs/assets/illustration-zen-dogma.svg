<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 320" role="img" aria-labelledby="zen-title zen-desc">
  <title id="zen-title">Ten dogmas as zen stones along a river path</title>
  <desc id="zen-desc">A section-style zen garden with a river path and ten organic stone forms labeled with the dogmas: Purpose, Explicit Intent, Flat Traversal, Loud Failures, Meaningful Abstraction, Unambiguous Naming, Visible State, Strict Fences, Ruthless Deletion, and Proportionate Complexity.</desc>

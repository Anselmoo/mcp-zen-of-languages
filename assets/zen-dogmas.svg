<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" aria-labelledby="zen-title zen-desc" role="img">
  <title id="zen-title">The 10 Dogmas of Zen</title>
  <desc id="zen-desc">A minimalist visual representing the 10 Zen Dogmas of code quality: ten stones arranged in a zen garden pattern with code-inspired motifs, connecting philosophy and software craftsmanship.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="stone" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#989cff"/>
      <stop offset="100%" stop-color="#c9b3ff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="520" rx="16" fill="url(#bg)"/>

  <!-- Zen garden rake lines -->
  <g stroke="#2a2a4a" stroke-width="1" fill="none" opacity="0.5">
    <path d="M 50 480 Q 400 440 750 480"/>
    <path d="M 50 490 Q 400 450 750 490"/>
    <path d="M 50 500 Q 400 460 750 500"/>
  </g>

  <!-- Code bracket motifs -->
  <text x="30" y="60" font-family="monospace" font-size="40" fill="#989cff" opacity="0.15">{</text>
  <text x="750" y="480" font-family="monospace" font-size="40" fill="#989cff" opacity="0.15">}</text>
  <text x="700" y="60" font-family="monospace" font-size="24" fill="#c9b3ff" opacity="0.1">&lt;/&gt;</text>

  <!-- Title -->
  <text x="400" y="52" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="#e0e0ff" letter-spacing="2">THE 10 DOGMAS OF ZEN</text>
  <line x1="280" y1="62" x2="520" y2="62" stroke="#989cff" stroke-width="1" opacity="0.5"/>

  <!-- Dogma stones: two rows of five -->
  <!-- Row 1 -->
  <g filter="url(#glow)">
    <!-- 1. Purpose -->
    <ellipse cx="120" cy="150" rx="58" ry="34" fill="url(#stone)" opacity="0.85"/>
    <text x="120" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#1a1a2e">1 · PURPOSE</text>
    <text x="120" y="160" text-anchor="middle" font-family="monospace" font-size="8" fill="#1a1a2e" opacity="0.7">UTILIZE-ARGUMENTS</text>

    <!-- 2. Explicit Intent -->
    <ellipse cx="270" cy="140" rx="58" ry="34" fill="url(#stone)" opacity="0.85"/>
    <text x="270" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#1a1a2e">2 · EXPLICIT</text>
    <text x="270" y="150" text-anchor="middle" font-family="monospace" font-size="8" fill="#1a1a2e" opacity="0.7">EXPLICIT-INTENT</text>

    <!-- 3. Flat Traversal -->
    <ellipse cx="410" cy="145" rx="58" ry="34" fill="url(#stone)" opacity="0.85"/>
    <text x="410" y="140" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#1a1a2e">3 · FLAT</text>
    <text x="410" y="155" text-anchor="middle" font-family="monospace" font-size="8" fill="#1a1a2e" opacity="0.7">RETURN-EARLY</text>

    <!-- 4. Loud Failures -->
    <ellipse cx="545" cy="138" rx="58" ry="34" fill="url(#stone)" opacity="0.85"/>
    <text x="545" y="133" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#1a1a2e">4 · LOUD</text>
    <text x="545" y="148" text-anchor="middle" font-family="monospace" font-size="8" fill="#1a1a2e" opacity="0.7">FAIL-FAST</text>

    <!-- 5. Meaningful Abstraction -->
    <ellipse cx="685" cy="148" rx="58" ry="34" fill="url(#stone)" opacity="0.85"/>
    <text x="685" y="143" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#1a1a2e">5 · ABSTRACT</text>
    <text x="685" y="158" text-anchor="middle" font-family="monospace" font-size="8" fill="#1a1a2e" opacity="0.7">RIGHT-ABSTRACTION</text>
  </g>

  <!-- Connection lines between rows -->
  <g stroke="#989cff" stroke-width="0.5" opacity="0.2">
    <line x1="120" y1="184" x2="160" y2="280"/>
    <line x1="270" y1="174" x2="305" y2="290"/>
    <line x1="410" y1="179" x2="430" y2="285"/>
    <line x1="545" y1="172" x2="560" y2="282"/>
    <line x1="685" y1="182" x2="680" y2="288"/>
  </g>

  <!-- Row 2 -->
  <g filter="url(#glow)">
    <!-- 6. Unambiguous Naming -->
    <ellipse cx="160" cy="310" rx="58" ry="34" fill="url(#stone)" opacity="0.85"/>
    <text x="160" y="305" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#1a1a2e">6 · NAMING</text>
    <text x="160" y="320" text-anchor="middle" font-family="monospace" font-size="8" fill="#1a1a2e" opacity="0.7">UNAMBIGUOUS-NAME</text>

    <!-- 7. Visible State -->
    <ellipse cx="305" cy="320" rx="58" ry="34" fill="url(#stone)" opacity="0.85"/>
    <text x="305" y="315" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#1a1a2e">7 · VISIBLE</text>
    <text x="305" y="330" text-anchor="middle" font-family="monospace" font-size="8" fill="#1a1a2e" opacity="0.7">VISIBLE-STATE</text>

    <!-- 8. Strict Fences -->
    <ellipse cx="430" cy="315" rx="58" ry="34" fill="url(#stone)" opacity="0.85"/>
    <text x="430" y="310" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#1a1a2e">8 · FENCES</text>
    <text x="430" y="325" text-anchor="middle" font-family="monospace" font-size="8" fill="#1a1a2e" opacity="0.7">STRICT-FENCES</text>

    <!-- 9. Ruthless Deletion -->
    <ellipse cx="560" cy="308" rx="58" ry="34" fill="url(#stone)" opacity="0.85"/>
    <text x="560" y="303" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#1a1a2e">9 · DELETE</text>
    <text x="560" y="318" text-anchor="middle" font-family="monospace" font-size="8" fill="#1a1a2e" opacity="0.7">RUTHLESS-DELETION</text>

    <!-- 10. Proportionate Complexity -->
    <ellipse cx="680" cy="318" rx="58" ry="34" fill="url(#stone)" opacity="0.85"/>
    <text x="680" y="313" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#1a1a2e">10 · SIMPLE</text>
    <text x="680" y="328" text-anchor="middle" font-family="monospace" font-size="8" fill="#1a1a2e" opacity="0.7">PROPORTIONATE</text>
  </g>

  <!-- Architecture layers label -->
  <g font-family="monospace" font-size="9" fill="#c9b3ff" opacity="0.6">
    <text x="400" y="410" text-anchor="middle">┌─────────────────────────────────────────────────────────────────────┐</text>
    <text x="400" y="424" text-anchor="middle">│  UNIVERSAL DOGMAS  →  LANGUAGE ADAPTERS  →  MCP / CLI TRANSPORT   │</text>
    <text x="400" y="438" text-anchor="middle">└─────────────────────────────────────────────────────────────────────┘</text>
  </g>

  <!-- Subtitle -->
  <text x="400" y="470" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#e0e0ff" opacity="0.6" letter-spacing="1">mcp-zen-of-languages</text>
</svg>

    </linearGradient>
    <linearGradient id="zen-ground" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#e9e4f7"/>
      <stop offset="100%" stop-color="#dfd8f2"/>
    </linearGradient>
    <linearGradient id="zen-path" x1="0" x2="1" y1="0.5" y2="0.5">
      <stop offset="0%" stop-color="#b8bcff" stop-opacity="0.34"/>
      <stop offset="55%" stop-color="#989cff"/>
      <stop offset="100%" stop-color="#c9b3ff" stop-opacity="0.45"/>
    </linearGradient>
